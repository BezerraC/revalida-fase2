name: medmaster
region: nyc
services:
  - name: backend
    github:
      branch: main
      deploy_on_push: true
      repo: BezerraC/revalida-fase2
    source_dir: backend
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: GOOGLE_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: MONGODB_URI
        scope: RUN_TIME
        type: SECRET
      - key: JWT_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ASAAS_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: GOOGLE_CLIENT_ID
        scope: RUN_TIME
        type: SECRET

  - name: frontend
    github:
      branch: main
      deploy_on_push: true
      repo: BezerraC/revalida-fase2
    source_dir: frontend
    dockerfile_path: Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NEXT_PUBLIC_API_URL
        scope: RUN_TIME
        value: https://backend-url.ondigitalocean.app
